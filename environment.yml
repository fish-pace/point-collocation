name: point-collocation-dev
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10
  # core
  - xarray>=2023.1.0
  - pandas>=2.0.0
  - numpy>=1.24.0
  # optional extras
  - earthaccess>=0.9.0
  - xoak>=0.2.0
  - scikit-learn>=1.0.0
  # testing
  - pytest>=7.0
  - pytest-cov
  - netcdf4
  - h5netcdf
  - dask
  # linting / type-checking
  - ruff
  - mypy
  - ipykernel
  - pip
  - pip:
      # docs (mkdocstrings extras are pip-only)
      - mkdocs>=1.5,<2.0
      - mkdocs-material>=9.0
      - mkdocstrings[python]>=0.24
      # install the package itself in editable mode
      - -e .
